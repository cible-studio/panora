[variables]
PHP_VERSION = "8.3"
NODE_VERSION = "20"

[phases.build]
cmds = [
    "composer install --optimize-autoloader --no-dev --no-interaction",
    "npm ci && npm run build",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force && php artisan storage:link && PHP_INI_SCAN_DIR=/app/php/conf.d php -S 0.0.0.0:$PORT -t public"