[variables]
PHP_VERSION = "8.3"
NODE_VERSION = "20"

[phases.build]
cmds = [
    "echo 'upload_max_filesize=35M' >> /nix/store/$(ls /nix/store | grep 'php-with-extensions')/lib/php.ini || true",
    "echo 'post_max_size=350M' >> /nix/store/$(ls /nix/store | grep 'php-with-extensions')/lib/php.ini || true",
    "composer install --optimize-autoloader --no-dev --no-interaction",
    "npm ci && npm run build",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
]

[start]
cmd = "PHP_INI_SCAN_DIR=/app/php/conf.d php -S 0.0.0.0:$PORT -t public"