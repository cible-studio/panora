[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo_mysql", "php82Extensions.mbstring",
           "php82Extensions.xml", "php82Extensions.curl", "php82Extensions.zip",
           "php82Extensions.gd", "php82Extensions.intl", "php82Extensions.bcmath",
           "nodejs_20", "caddy"]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm ci",
    "npm run build"
]

[phases.build]
cmds = [
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force && php artisan storage:link && php-fpm & caddy run"