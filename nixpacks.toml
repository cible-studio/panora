[variables]
PHP_VERSION = "8.3"
NIXPACKS_PHP_VERSION = "8.3"

[phases.setup]
nixPkgs = [
    "php83",
    "php83Extensions.pdo_mysql",
    "php83Extensions.mbstring",
    "php83Extensions.xml",
    "php83Extensions.curl",
    "php83Extensions.zip",
    "php83Extensions.gd",
    "php83Extensions.intl",
    "php83Extensions.bcmath",
    "php83Extensions.dom",
    "php83Extensions.tokenizer",
    "php83Extensions.fileinfo",
    "php83Extensions.openssl",
    "nodejs_20"
]

[phases.install]
cmds = [
    "composer install --optimize-autoloader --no-dev --no-interaction",
    "npm ci",
    "npm run build"
]

[phases.build]
cmds = [
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force && php artisan storage:link && php artisan serve --host=0.0.0.0 --port=$PORT"