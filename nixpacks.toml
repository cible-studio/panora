[variables]
PHP_VERSION = "8.3"
NODE_VERSION = "20"

[phases.build]
cmds = [
    "composer install --optimize-autoloader --no-dev --no-interaction",
    "npm ci && npm run build",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force && php artisan storage:link && php -d upload_max_filesize=35M -d post_max_size=350M -d memory_limit=512M artisan serve --host=0.0.0.0 --port=$PORT"